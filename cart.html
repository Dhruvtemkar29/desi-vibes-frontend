<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Desi Vibes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="api.js"></script>
    <script type="module" src="components.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #e8f5f7 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .cart-main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            margin-top: 30px;
        }
        
        .cart-items-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(26, 83, 92, 0.08);
            border: 1px solid rgba(164, 210, 218, 0.3);
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(164, 210, 218, 0.2);
            transition: all 0.3s ease;
        }
        
        .cart-item:hover {
            background: rgba(78, 205, 196, 0.05);
        }
        
        .product-image {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 20px;
        }
        
        .product-details {
            flex: 1;
        }
        
        .product-details h3 {
            color: #1a535c;
            margin-bottom: 5px;
        }
        
        .product-price {
            font-weight: 700;
            color: #4ecdc4;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .qty-btn {
            width: 35px;
            height: 35px;
            border: none;
            background: linear-gradient(135deg, #4ecdc4, #2d7a87);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .qty-btn:hover {
            transform: scale(1.1);
        }
        
        .qty-input {
            width: 50px;
            text-align: center;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .remove-item {
            background: #ff5252;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .remove-item:hover {
            transform: scale(1.1);
            background: #ff0000;
        }
        
        .summary-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(26, 83, 92, 0.08);
            border: 1px solid rgba(164, 210, 218, 0.3);
            position: sticky;
            top: 100px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row.total {
            font-size: 20px;
            font-weight: 700;
            color: #1a535c;
            border-top: 2px solid #4ecdc4;
            margin-top: 10px;
            padding-top: 15px;
        }
        
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecdc4 0%, #2d7a87 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.3);
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-cart i {
            font-size: 80px;
            color: #ccc;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .cart-main {
                grid-template-columns: 1fr;
            }
            
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            
            .product-image {
                margin-right: 0;
                margin-bottom: 15px;
            }
            
            .quantity-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main-navbar></main-navbar>
    
    <div class="container" id="cartContainer">
        <div class="text-center" style="padding: 60px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 48px; color: #4ecdc4;"></i>
            <p>Loading cart...</p>
        </div>
    </div>
    
    <main-footer></main-footer>
    
    <script>
        async function loadCart() {
            const container = document.getElementById('cartContainer');
            
            try {
                const response = await window.DesiVibesAPI.cart.getCart();
                
                if (!response.success || !response.cart || response.cart.items.length === 0) {
                    container.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <h2>Your cart is empty</h2>
                            <p>Looks like you haven't added any items to your cart yet.</p>
                            <a href="shop.html" class="btn" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: #4ecdc4; color: white; text-decoration: none; border-radius: 8px;">Continue Shopping</a>
                        </div>
                    `;
                    return;
                }
                
                const cart = response.cart;
                
                container.innerHTML = `
                    <h1 style="color: #1a535c; margin-bottom: 20px;">Shopping Cart (${cart.total_items} items)</h1>
                    <div class="cart-main">
                        <div class="cart-items-section">
                            ${cart.items.map(item => `
                                <div class="cart-item" data-item-id="${item.id}">
                                    <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}" class="product-image">
                                    <div class="product-details">
                                        <h3>${item.name}</h3>
                                        <div class="product-price">₹${item.price}</div>
                                        <div class="quantity-controls">
                                            <button class="qty-btn" data-action="decrease">-</button>
                                            <span class="qty-input">${item.quantity}</span>
                                            <button class="qty-btn" data-action="increase">+</button>
                                        </div>
                                    </div>
                                    <div style="text-align: right;">
                                        <div class="product-price" style="font-size: 18px;">₹${item.total}</div>
                                        <button class="remove-item" data-action="remove"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="summary-card">
                            <h3 style="margin-bottom: 20px; color: #1a535c;">Order Summary</h3>
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span>₹${cart.subtotal.toFixed(2)}</span>
                            </div>
                            <div class="summary-row">
                                <span>Shipping</span>
                                <span>${cart.subtotal > 700 ? 'FREE' : '₹50'}</span>
                            </div>
                            <div class="summary-row">
                                <span>Tax (18% GST)</span>
                                <span>₹${(cart.subtotal * 0.18).toFixed(2)}</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total</span>
                                <span>₹${(cart.subtotal + (cart.subtotal > 700 ? 0 : 50) + (cart.subtotal * 0.18)).toFixed(2)}</span>
                            </div>
                            <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
                        </div>
                    </div>
                `;
                
                attachCartEvents();
                
            } catch (error) {
                console.error('Failed to load cart:', error);
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Error Loading Cart</h2>
                        <p>Please make sure you are logged in.</p>
                        <a href="account.html" class="btn" style="display: inline-block; margin-top: 20px; padding: 12px 30px;">Login / Register</a>
                    </div>
                `;
            }
        }
        
        function attachCartEvents() {
            // Quantity update handlers
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const cartItem = this.closest('.cart-item');
                    const itemId = cartItem.dataset.itemId;
                    const quantitySpan = cartItem.querySelector('.qty-input');
                    let quantity = parseInt(quantitySpan.textContent);
                    
                    if (this.dataset.action === 'increase') {
                        quantity++;
                    } else if (this.dataset.action === 'decrease' && quantity > 1) {
                        quantity--;
                    }
                    
                    try {
                        await window.DesiVibesAPI.cart.updateQuantity(itemId, quantity);
                        loadCart(); // Reload cart
                    } catch (error) {
                        alert('Failed to update quantity');
                    }
                });
            });
            
            // Remove item handlers
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const cartItem = this.closest('.cart-item');
                    const itemId = cartItem.dataset.itemId;
                    
                    if (confirm('Remove this item from cart?')) {
                        try {
                            await window.DesiVibesAPI.cart.removeItem(itemId);
                            loadCart();
                        } catch (error) {
                            alert('Failed to remove item');
                        }
                    }
                });
            });
            
            // Checkout handler
            const checkoutBtn = document.getElementById('checkoutBtn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', async () => {
                    const isLoggedIn = window.DesiVibesAPI.isLoggedIn();
                    if (!isLoggedIn) {
                        if (confirm('Please login to continue checkout. Go to login page?')) {
                            window.location.href = 'account.html';
                        }
                        return;
                    }
                    
                    // Redirect to checkout page (we'll create this in next phase)
                    alert('Checkout functionality coming soon! For now, please use COD.');
                    // window.location.href = 'checkout.html';
                });
            }
        }
        
        loadCart();
    </script>
</body>
</html>
